<body>

    <div class="letraRondo">RONDO-AUFIT</div>

        <div class="grupo">
            <label>Usuario</label>

        <div id="mensajeError"></div>

        <div class="volver">
            <a href="tienda.html">← Volver a la tienda</a>

    <script src="datos.js"></script>
